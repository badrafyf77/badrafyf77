<svg fill="none" viewBox="0 0 680 90" width="680" height="90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9">
        <animate attributeName="stop-color" values="#0ea5e9;#2563eb;#38bdf8;#0ea5e9" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#2563eb">
        <animate attributeName="stop-color" values="#2563eb;#38bdf8;#0ea5e9;#2563eb" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="transparent" />

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800"
        fill="url(#blueGradient)">
    Afyf Badreddine
  </text>
</svg>
